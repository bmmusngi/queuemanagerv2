version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: badminton_queue_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: queue_admin
      POSTGRES_PASSWORD: super_secure_password_here
      POSTGRES_DB: queue_manager
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queue_admin -d queue_manager"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - badminton-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: badminton_queue_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # CHANGED: Using the full container name 'badminton_queue_db' and added quotes
      - DATABASE_URL=postgresql://queue_admin:super_secure_password_here@badminton_queue_db:5432/queue_manager?schema=public
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    networks:
      - badminton-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: badminton_queue_frontend
    restart: unless-stopped
    ports:
      - "3000:80" 
    depends_on:
      - backend
    networks:
      - badminton-net

# ADDED: Explicitly define the network
networks:
  badminton-net:
    driver: bridge

volumes:
  pgdata:
