version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: badminton_queue_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: queue_admin
      POSTGRES_PASSWORD: super_secure_password_here
      POSTGRES_DB: queue_manager
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. NestJS Backend (Zombie Trap Version)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: badminton_queue_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://queue_admin:super_secure_password_here@db:5432/queue_manager?schema=public
      - PORT=3001
    depends_on:
      - db

  # 3. React Frontend (Zombie Trap Version)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: badminton_queue_frontend
    restart: unless-stopped
    ports:
      - "3000:3000" 
    depends_on:
      - backend

volumes:
  pgdata:
